<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta id="api-base" content="">
  <script id="auth-config" type="application/json"></script>
  <title>Config Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="app-header">
    <span class="app-title">Config Dashboard</span>
  </header>

  <div class="layout">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-section">
        <label class="sidebar-label" for="ns-input">Open Namespace</label>
        <div class="ns-row">
          <input id="ns-input" class="input" type="text" placeholder="my-app" autocomplete="off">
          <button id="load-btn" class="btn btn-primary">Open</button>
        </div>
        <p class="sidebar-hint">Type a name to jump directly, or pick one from the list below.</p>
      </div>

      <div class="sidebar-section">
        <label class="sidebar-label" for="ns-filter-input">Namespaces</label>
        <input id="ns-filter-input" class="input" type="text" placeholder="Filter by prefix" autocomplete="off">
        <ul id="ns-list" class="ns-list"></ul>
        <div id="ns-list-empty" class="sidebar-hint" style="display:none">No namespaces found.</div>
        <div id="ns-list-error" class="sidebar-hint" style="display:none"></div>
        <div class="sidebar-footer">
          <button id="ns-load-more" class="btn btn-secondary btn-sm" style="display:none">Load more</button>
        </div>
      </div>

      <div class="sidebar-section" id="auth-section" style="display:none">
        <label class="sidebar-label" for="auth-token-input">Auth Token</label>
        <div class="ns-row">
          <input id="auth-token-input" class="input" type="password" placeholder="Bearer token" autocomplete="off">
          <button id="auth-token-save" type="button" class="btn btn-secondary">Set</button>
        </div>
      </div>

      <div class="sidebar-section recent-section" id="recent-section" style="display:none">
        <label class="sidebar-label">Recent</label>
        <ul id="recent-list" class="recent-list"></ul>
      </div>
    </aside>

    <!-- Main content -->
    <main class="main">
      <div id="ns-header" class="ns-header" style="display:none">
        <h2 id="ns-title" class="ns-title"></h2>
        <span id="key-count" class="key-count"></span>
      </div>

      <div id="keys-toolbar" class="keys-toolbar" style="display:none">
        <input id="key-prefix-input" class="input" type="text" placeholder="Filter keys by prefix" autocomplete="off">
        <button id="add-key-btn" type="button" class="btn btn-primary">Add Key</button>
      </div>

      <div id="empty-state" class="empty-state">
        <p>Enter a namespace in the sidebar and click Open.</p>
      </div>

      <div id="table-wrapper" style="display:none">
        <table class="keys-table">
          <thead>
            <tr>
              <th>Key</th>
              <th>Value</th>
              <th>Codec</th>
              <th>Version</th>
              <th>Updated</th>
              <th class="col-actions">Actions</th>
            </tr>
          </thead>
          <tbody id="keys-table-body"></tbody>
        </table>

        <div class="table-footer">
          <button id="load-more" class="btn btn-secondary" style="display:none">Load more</button>
        </div>
      </div>
    </main>
  </div>

  <!-- Add Key modal -->
  <div id="add-modal" class="modal-overlay" style="display:none" role="dialog" aria-modal="true" aria-labelledby="add-modal-heading">
    <div class="modal">
      <h3 id="add-modal-heading" class="modal-title">Add Key</h3>
      <div class="modal-body">
        <div class="form-row">
          <label class="form-label">Namespace</label>
          <input id="add-ns" class="input" type="text" readonly>
        </div>
        <div class="form-row">
          <label class="form-label" for="add-key">Key</label>
          <input id="add-key" class="input" type="text" placeholder="config.key" autocomplete="off">
        </div>
        <div class="form-row form-row-inline">
          <div class="form-row">
            <label class="form-label" for="add-value-type">Value Type</label>
            <select id="add-value-type" class="input">
              <option value="string">String</option>
              <option value="number">Number</option>
              <option value="boolean">Boolean</option>
              <option value="json">JSON</option>
              <option value="raw">Raw</option>
            </select>
          </div>
          <div class="form-row">
            <label class="form-label" for="add-codec">Codec</label>
            <select id="add-codec" class="input">
              <option value="json">json</option>
              <option value="yaml">yaml</option>
              <option value="toml">toml</option>
              <option value="raw">raw</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <label class="form-label" for="add-value">Value</label>
          <textarea id="add-value" class="input textarea" rows="6" placeholder='{"key":"value"}'></textarea>
          <p id="add-value-hint" class="form-hint"></p>
        </div>
      </div>
      <div class="modal-footer">
        <button id="add-cancel" type="button" class="btn btn-secondary">Cancel</button>
        <button id="add-save" type="button" class="btn btn-primary">Save</button>
      </div>
    </div>
  </div>

  <!-- Edit modal -->
  <div id="edit-modal" class="modal-overlay" style="display:none" role="dialog" aria-modal="true" aria-labelledby="modal-heading">
    <div class="modal">
      <h3 id="modal-heading" class="modal-title">Edit Key</h3>
      <div class="modal-body">
        <div class="form-row">
          <label class="form-label">Namespace</label>
          <input id="edit-ns" class="input" type="text" readonly>
        </div>
        <div class="form-row">
          <label class="form-label">Key</label>
          <input id="edit-key" class="input" type="text" readonly>
        </div>
        <div class="form-row">
          <label class="form-label" for="edit-codec">Codec</label>
          <select id="edit-codec" class="input">
            <option value="json">json</option>
            <option value="yaml">yaml</option>
            <option value="toml">toml</option>
            <option value="raw">raw</option>
          </select>
        </div>
        <div class="form-row">
          <label class="form-label" for="edit-value">Value (plain text)</label>
          <textarea id="edit-value" class="input textarea" rows="6"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button id="edit-cancel" class="btn btn-secondary">Cancel</button>
        <button id="edit-save" class="btn btn-primary">Save</button>
      </div>
    </div>
  </div>

  <!-- Toast notification -->
  <div id="toast" class="toast" aria-live="polite" style="display:none"></div>

  <script src="app.js"></script>
</body>
</html>
